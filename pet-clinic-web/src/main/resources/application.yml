spring:
  profiles:
    active: dev, springdatajpa, debug

  jpa:
    show-sql: false

---
spring:
  config:
    activate:
      on-profile: dev
  h2:
    console:
      enabled: false
  datasource:
    url: 'jdbc:h2:mem:testdb'
  jpa:
    show-sql: false
---
spring:
  config:
    activate:
      on-profile: debug
  jpa:
    show-sql: false
